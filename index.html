<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>练舞打卡记录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      background: #f7f8fa;
      padding-bottom: 70px;
    }
    .page {
      display: none;
      padding: 16px;
    }
    .page.active {
      display: block;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .top-bar h2 {
      font-size: 20px;
    }
    .add-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ff6b9d;
      color: white;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }
    /* 日历样式（新增月份切换） */
    .calendar {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .calendar-arrow {
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      padding: 0 8px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .day-item {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
      background: #f1f1f1;
      cursor: pointer;
    }
    .day-item.today {
      background: #ffe7ef;
      border: 1px solid #ff6b9d;
    }
    .day-item.recorded {
      background: #ffd6e3;
    }
    .day-item.selected {
      background: #ff6b9d;
      color: white;
    }
    .day-hour {
      font-size: 10px;
      margin-top: 2px;
    }
    .modal-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99;
    }
    .modal-wrap.show {
      display: flex;
    }
    .modal {
      background: white;
      width: 85%;
      border-radius: 12px;
      padding: 20px;
    }
    .modal h3 {
      margin-bottom: 12px;
    }
    .modal input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .modal-btns {
      display: flex;
      gap: 10px;
    }
    .modal-btns button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    .save-btn {
      background: #ff6b9d;
      color: white;
    }
    .img-box {
      margin-top: 16px;
    }
    .img-box h4 {
      margin-bottom: 8px;
    }
    .img-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
    }
    .img-list img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .stat-card p {
      font-size: 16px;
      margin: 8px 0;
    }
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 64px;
      background: #fff;
      display: flex;
      border-top: 1px solid #eee;
    }
    .tab-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #666;
      cursor: pointer;
    }
    .tab-item.active {
      color: #ff6b9d;
      font-weight: bold;
    }
    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="page-record" class="page active">
    <div class="top-bar">
      <h2>练舞记录</h2>
      <button class="add-btn" id="upload-photo-btn">+</button>
      <input type="file" id="file-input" accept="image/*" multiple>
    </div>
    <div class="calendar" id="calendar-box"></div>
    <div class="img-box">
      <h4>当日照片</h4>
      <div class="img-list" id="photo-list"></div>
    </div>
  </div>

  <div id="page-mine" class="page">
    <h2 style="margin:16px 0">我的统计</h2>
    <div class="stat-card">
      <p>累计练舞总时长：<span id="total-all">0</span> h</p>
      <p>本月练舞总时长：<span id="total-month">0</span> h</p>
      <p>打卡总天数：<span id="total-days">0</span> 天</p>
    </div>
  </div>

  <div class="modal-wrap" id="modal-time">
    <div class="modal">
      <h3>填写今日练舞时长</h3>
      <input type="number" step="0.5" placeholder="输入小时，例如 1.5" id="time-input">
      <div class="modal-btns">
        <button id="cancel-btn">取消</button>
        <button class="save-btn" id="save-time-btn">保存</button>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" data-page="record">记录</div>
    <div class="tab-item" data-page="mine">我的</div>
  </div>

  <script>
    let currentSelectDate = '';
    let recordData = JSON.parse(localStorage.getItem('danceRecord')) || {};
    // 新增：当前显示的年份和月份（默认2026年）
    let currentYear = 2026;
    let currentMonth = new Date().getMonth(); // 0-11

    const tabItems = document.querySelectorAll('.tab-item');
    const pages = document.querySelectorAll('.page');
    const calendarBox = document.getElementById('calendar-box');
    const modalWrap = document.getElementById('modal-time');
    const timeInput = document.getElementById('time-input');
    const saveTimeBtn = document.getElementById('save-time-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const uploadBtn = document.getElementById('upload-photo-btn');
    const fileInput = document.getElementById('file-input');
    const photoList = document.getElementById('photo-list');
    const totalAll = document.getElementById('total-all');
    const totalMonth = document.getElementById('total-month');
    const totalDays = document.getElementById('total-days');

    // Tab切换
    tabItems.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetId = tab.dataset.page;
        tabItems.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        pages.forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${targetId}`).classList.add('active');
        if(targetId === 'mine') calcStat();
      })
    })

    // 渲染日历（支持切换月份）
    function renderCalendar() {
      const now = new Date();
      const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0);
      const daysTotal = lastDay.getDate();
      
      let html = `
        <div class="calendar-header">
          <div class="calendar-arrow" id="prev-month">‹</div>
          <div>${currentYear}年${currentMonth+1}月</div>
          <div class="calendar-arrow" id="next-month">›</div>
        </div>
        <div class="calendar-grid">
      `;

      // 填充前置空白
      for(let i=0; i<firstDay.getDay(); i++) {
        html += `<div class="day-item"></div>`;
      }

      // 生成日期格子
      for(let d=1; d<=daysTotal; d++) {
        const dayStr = String(d).padStart(2,'0');
        const dateKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${dayStr}`;
        const record = recordData[dateKey];
        let cls = 'day-item';
        if(dateKey === todayStr) cls += ' today';
        if(record) cls += ' recorded';
        if(dateKey === currentSelectDate) cls += ' selected';

        let hourText = record ? `<div class="day-hour">${record.h}h</div>` : '';
        html += `
          <div class="${cls}" data-date="${dateKey}">
            ${d}
            ${hourText}
          </div>
        `;
      }
      html += `</div>`;
      calendarBox.innerHTML = html;

      // 绑定月份切换事件
      document.getElementById('prev-month').onclick = () => {
        currentMonth--;
        if(currentMonth < 0) {
          currentMonth = 11;
          currentYear--;
        }
        renderCalendar();
      };
      document.getElementById('next-month').onclick = () => {
        currentMonth++;
        if(currentMonth > 11) {
          currentMonth = 0;
          currentYear++;
        }
        renderCalendar();
      };

      // 绑定日期点击事件
      document.querySelectorAll('.day-item[data-date]').forEach(dayEl => {
        dayEl.addEventListener('click', () => {
          currentSelectDate = dayEl.dataset.date;
          openTimeModal();
          renderCalendar();
          renderPhoto();
        })
      })
    }

    function openTimeModal() {
      modalWrap.classList.add('show');
      const d = recordData[currentSelectDate];
      timeInput.value = d ? d.h : '';
    }
    function closeModal() {
      modalWrap.classList.remove('show');
      timeInput.value = '';
    }
    cancelBtn.onclick = closeModal;

    saveTimeBtn.onclick = () => {
      const h = parseFloat(timeInput.value);
      if(isNaN(h) || h <= 0) {
        alert('请输入有效的练舞时长');
        return;
      }
      if(!recordData[currentSelectDate]) {
        recordData[currentSelectDate] = { h:0, imgs:[] };
      }
      recordData[currentSelectDate].h = h;
      saveLocal();
      closeModal();
      renderCalendar();
      calcStat();
    }

    uploadBtn.onclick = () => fileInput.click();
    fileInput.onchange = function(e) {
      if(!currentSelectDate) {
        alert('请先点击选择日期');
        return;
      }
      const files = e.target.files;
      if(files.length === 0) return;
      if(!recordData[currentSelectDate]) recordData[currentSelectDate] = {h:0, imgs:[]};
      for(let file of files) {
        const reader = new FileReader();
        reader.onload = ev => {
          recordData[currentSelectDate].imgs.push(ev.target.result);
          saveLocal();
          renderPhoto();
        }
        reader.readAsDataURL(file);
      }
    }

    function renderPhoto() {
      photoList.innerHTML = '';
      if(!currentSelectDate) return;
      const d = recordData[currentSelectDate];
      if(!d || !d.imgs || d.imgs.length === 0) return;
      d.imgs.forEach(src => {
        photoList.innerHTML += `<img src="${src}">`;
      })
    }

    function saveLocal() {
      localStorage.setItem('danceRecord', JSON.stringify(recordData));
    }

    function calcStat() {
      const now = new Date();
      const currentMonthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
      let allHour = 0;
      let monthHour = 0;
      let dayCount = 0;

      for(let key in recordData) {
        const item = recordData[key];
        allHour += item.h;
        if(key.startsWith(currentMonthStr)) monthHour += item.h;
        dayCount++;
      }
      totalAll.textContent = allHour.toFixed(1);
      totalMonth.textContent = monthHour.toFixed(1);
      totalDays.textContent = dayCount;
    }

    // 初始化渲染
    renderCalendar();
    calcStat();
  </script>
</body>
</html>
